<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:
    radial-gradient(circle at top right, #d68fff 0%, transparent 30%),
    radial-gradient(circle at bottom right, #3b82f6 0%, transparent 25%),
    linear-gradient(90deg,#07161d 0%, #08304b 30%, #5963a6 100%);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    padding:35px;
    border-radius:22px;
    width:350px;
    color:white;
    text-align:center;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:white;
    font-weight:bold;
    cursor:pointer;
}

a{
    color:white;
}
</style>
</head>

<body>

<div class="card">
    <h1>🔐 Login</h1>

    <input id="email" type="email" placeholder="Seu email">
    <input id="senha" type="password" placeholder="Sua senha">

    <button onclick="login()">Entrar</button>

    <p>
        Não tem conta?
        <a href="signup.html">Cadastre-se</a>
    </p>
</div>

<script type="module" src="auth.js"></script>

</body>
</html>
